version: "3.9"

###############################################################################
# BCG X Analytics Accelerator — Full Stack
###############################################################################

networks:
  bcgx-network:
    driver: bridge

volumes:
  bcgx-data:
    name: bcgx-data
  bcgx-mlruns:
    name: bcgx-mlruns

services:

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: bcgx-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - bcgx-mlruns:/mlruns
    networks:
      - bcgx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: bcgx-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - bcgx-data:/app/data
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - bcgx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Streamlit Dashboard ─────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: bcgx-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - DASHBOARD_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - bcgx-network
